<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        function fn(){
            // 可以执行任何你需要做的事情
            console.log("你点我了 ");
        }
    </script>
</head>
<body>
    <!-- 从HTML通过事件, 触发某一个js的代码执行 -->
    <input type="button" value="点我" onclick="fn();">
    <hr>

    <div>
        空的
    </div>
</body>
</html>
