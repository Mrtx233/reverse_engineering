        // map, foreach

        var arr = ['吃瓜', '我爱你', '我恨你', '还我钱'];
        // // forEach会拿arr中每一项数据去执行里面的函数
        arr.forEach(function(e, t){
            console.log(e, t); // 第一个参数是数据, 第二个参数是索引
        });
        console.log("===>");
        // map会拿arr中每一项数据去执行里面的函数, 会收集每一项计算之后的结果.
        var r = arr.map(function(e, t){
            console.log(e, t);
            return e + t;
        });
