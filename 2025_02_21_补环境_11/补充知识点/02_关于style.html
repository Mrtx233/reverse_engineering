<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="d" style="width:88px; height:99px; border: 1px solid red;">123456</div>
    <button id="btn">点我</button>
    <script>
        let div = document.getElementById("d");
        document.getElementById("btn").addEventListener("click", function(){
            div.style = "color:blue; border:2px solid blue;";
        })
    </script>
</body>
</html>
