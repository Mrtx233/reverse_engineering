        // 死亡回调
        // 你去干一个事情, 回来之后. 要继续做什么

        // es6退出. promise.then逻辑. 解决死亡回调

        function send(sth){
            // promise; 保证给你一个结果
            return new Promise(function(resolve, reject){
                // 干活去
                // 发请求
                console.log("发请求", sth);
                setTimeout(function(){
                    var result = "操作成功!!!";
                    if (sth.indexOf("3") != -1){ // 在3.xxxx 进入reject
                        reject("有问题了");
                    } else {
                        if (true){
                            // 执行正确的方案
                            resolve(result); // 我给了你一个正确结果
                        } else {
                            // 执行错误的方案
                            reject(result); // 给你一个错误的结果
                        }
                    }
                }, 2000);
            });
        }

        // promise() 100%给一个结果, 结果传递给then()

        // promise().then().catch()

        // 尝试着套一套
        send("1.发请求, 查看验证码是否正确").then(function(result){
            console.log(result);
            // 如果在then函数中返回一个新的promise. 该promise的then可以写在外面. 形成链式调用
            return send("2.发请求, 查看用户名或密码是否正确")
        }).then(function(result){
            console.log(result);
            return send("3.发请求, 查看菜单")
        }).then(function(result){
            console.log(result);
